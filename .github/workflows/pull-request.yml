name: Pull request checks 🔎

on:
  pull_request:

jobs:
  toto:
    name: efezfezf
    runs-on: ubuntu-latest
    steps:
      - run: cat package.json
      - name: Setup PNPM
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

  lint:
    name: Check code quality 🫆
    runs-on: ubuntu-latest
    steps:
      - name: Check code quality 🫆
        uses: tchoupinax/repo-config/shared-actions/steps/node/lint@v0
        with:
          nodeVersion: 25

  unit-tests:
    name: Unit tests 🐏
    runs-on: ubuntu-latest
    strategy:
      matrix:
        nodeVersion: ["24.x", "25.x"]
    steps:
      - name: Unit tests 🐏
        uses: tchoupinax/repo-config/shared-actions/steps/node/test-unit@v0
        with:
          nodeVersion: ${{ matrix.nodeVersion }}
          command: "test"

  build:
    name: Check build success 🦫
    runs-on: ubuntu-latest
    steps:
      - name: Check build success 🦫
        uses: tchoupinax/repo-config/shared-actions/steps/node/build@v0
        with:
          nodeVersion: 25

  labels:
    name: Autodetect labels 🔍
    runs-on: ubuntu-latest
    steps:
      - name: Autodetect labels 🔍
        uses: tchoupinax/repo-config/shared-actions/steps/dx/automatically-apply-labels@v0
        with:
          appId: ${{ secrets.DEPLOY_APP_ID }}
          privateKey: ${{ secrets.DEPLOY_APP_KEY }}
